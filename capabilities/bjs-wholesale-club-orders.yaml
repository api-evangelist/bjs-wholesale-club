naftiko: 1.0.0-alpha2
info:
  label: BJ's Wholesale Club Partner API — Orders
  description: 'BJ''s Wholesale Club Partner API — Orders. 2 operations. Lead operation: Create Order. Self-contained Naftiko
    capability covering one Bjs Wholesale Club business surface.'
  tags:
  - Bjs Wholesale Club
  - Orders
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BJS_WHOLESALE_CLUB_API_KEY: BJS_WHOLESALE_CLUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: bjs-wholesale-club-orders
    baseUri: https://api.bjs.com/v1
    description: BJ's Wholesale Club Partner API — Orders business capability. Self-contained, no shared references.
    resources:
    - name: orders
      path: /orders
      operations:
      - name: createorder
        method: POST
        description: Create Order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: orders-orderId
      path: /orders/{orderId}
      operations:
      - name: getorder
        method: GET
        description: Get Order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orderId
          in: path
          type: string
          required: true
    authentication:
      type: apikey
      key: X-BJS-API-Key
      value: '{{env.BJS_WHOLESALE_CLUB_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: bjs-wholesale-club-orders-rest
    port: 8080
    description: REST adapter for BJ's Wholesale Club Partner API — Orders. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/orders
      name: orders
      description: REST surface for orders.
      operations:
      - method: POST
        name: createorder
        description: Create Order
        call: bjs-wholesale-club-orders.createorder
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/orders/{orderid}
      name: orders-orderid
      description: REST surface for orders-orderId.
      operations:
      - method: GET
        name: getorder
        description: Get Order
        call: bjs-wholesale-club-orders.getorder
        with:
          orderId: rest.orderId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bjs-wholesale-club-orders-mcp
    port: 9090
    transport: http
    description: MCP adapter for BJ's Wholesale Club Partner API — Orders. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: create-order
      description: Create Order
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: bjs-wholesale-club-orders.createorder
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-order
      description: Get Order
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bjs-wholesale-club-orders.getorder
      with:
        orderId: tools.orderId
      outputParameters:
      - type: object
        mapping: $.
