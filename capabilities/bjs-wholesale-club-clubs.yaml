naftiko: 1.0.0-alpha2
info:
  label: BJ's Wholesale Club Partner API — Clubs
  description: 'BJ''s Wholesale Club Partner API — Clubs. 1 operations. Lead operation: List Club Locations. Self-contained
    Naftiko capability covering one Bjs Wholesale Club business surface.'
  tags:
  - Bjs Wholesale Club
  - Clubs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BJS_WHOLESALE_CLUB_API_KEY: BJS_WHOLESALE_CLUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: bjs-wholesale-club-clubs
    baseUri: https://api.bjs.com/v1
    description: BJ's Wholesale Club Partner API — Clubs business capability. Self-contained, no shared references.
    resources:
    - name: clubs
      path: /clubs
      operations:
      - name: listclubs
        method: GET
        description: List Club Locations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: zip
          in: query
          type: string
          description: Filter clubs by proximity to ZIP code
        - name: radius
          in: query
          type: integer
          description: Radius in miles for ZIP-based search
    authentication:
      type: apikey
      key: X-BJS-API-Key
      value: '{{env.BJS_WHOLESALE_CLUB_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: bjs-wholesale-club-clubs-rest
    port: 8080
    description: REST adapter for BJ's Wholesale Club Partner API — Clubs. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/clubs
      name: clubs
      description: REST surface for clubs.
      operations:
      - method: GET
        name: listclubs
        description: List Club Locations
        call: bjs-wholesale-club-clubs.listclubs
        with:
          zip: rest.zip
          radius: rest.radius
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bjs-wholesale-club-clubs-mcp
    port: 9090
    transport: http
    description: MCP adapter for BJ's Wholesale Club Partner API — Clubs. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-club-locations
      description: List Club Locations
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bjs-wholesale-club-clubs.listclubs
      with:
        zip: tools.zip
        radius: tools.radius
      outputParameters:
      - type: object
        mapping: $.
