naftiko: 1.0.0-alpha2
info:
  label: BJ's Wholesale Club Partner API — Products
  description: 'BJ''s Wholesale Club Partner API — Products. 2 operations. Lead operation: List Products. Self-contained Naftiko
    capability covering one Bjs Wholesale Club business surface.'
  tags:
  - Bjs Wholesale Club
  - Products
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BJS_WHOLESALE_CLUB_API_KEY: BJS_WHOLESALE_CLUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: bjs-wholesale-club-products
    baseUri: https://api.bjs.com/v1
    description: BJ's Wholesale Club Partner API — Products business capability. Self-contained, no shared references.
    resources:
    - name: products
      path: /products
      operations:
      - name: listproducts
        method: GET
        description: List Products
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: category
          in: query
          type: string
          description: Filter by category name or ID
        - name: page
          in: query
          type: integer
        - name: limit
          in: query
          type: integer
    - name: products-productId
      path: /products/{productId}
      operations:
      - name: getproduct
        method: GET
        description: Get Product
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: productId
          in: path
          type: string
          required: true
    authentication:
      type: apikey
      key: X-BJS-API-Key
      value: '{{env.BJS_WHOLESALE_CLUB_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: bjs-wholesale-club-products-rest
    port: 8080
    description: REST adapter for BJ's Wholesale Club Partner API — Products. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/products
      name: products
      description: REST surface for products.
      operations:
      - method: GET
        name: listproducts
        description: List Products
        call: bjs-wholesale-club-products.listproducts
        with:
          category: rest.category
          page: rest.page
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/products/{productid}
      name: products-productid
      description: REST surface for products-productId.
      operations:
      - method: GET
        name: getproduct
        description: Get Product
        call: bjs-wholesale-club-products.getproduct
        with:
          productId: rest.productId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bjs-wholesale-club-products-mcp
    port: 9090
    transport: http
    description: MCP adapter for BJ's Wholesale Club Partner API — Products. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: list-products
      description: List Products
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bjs-wholesale-club-products.listproducts
      with:
        category: tools.category
        page: tools.page
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
    - name: get-product
      description: Get Product
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bjs-wholesale-club-products.getproduct
      with:
        productId: tools.productId
      outputParameters:
      - type: object
        mapping: $.
