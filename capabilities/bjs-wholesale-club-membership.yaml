naftiko: 1.0.0-alpha2
info:
  label: BJ's Wholesale Club Partner API — Membership
  description: 'BJ''s Wholesale Club Partner API — Membership. 1 operations. Lead operation: Verify Membership. Self-contained
    Naftiko capability covering one Bjs Wholesale Club business surface.'
  tags:
  - Bjs Wholesale Club
  - Membership
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BJS_WHOLESALE_CLUB_API_KEY: BJS_WHOLESALE_CLUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: bjs-wholesale-club-membership
    baseUri: https://api.bjs.com/v1
    description: BJ's Wholesale Club Partner API — Membership business capability. Self-contained, no shared references.
    resources:
    - name: membership-verify
      path: /membership/verify
      operations:
      - name: verifymembership
        method: POST
        description: Verify Membership
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: X-BJS-API-Key
      value: '{{env.BJS_WHOLESALE_CLUB_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: bjs-wholesale-club-membership-rest
    port: 8080
    description: REST adapter for BJ's Wholesale Club Partner API — Membership. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/membership/verify
      name: membership-verify
      description: REST surface for membership-verify.
      operations:
      - method: POST
        name: verifymembership
        description: Verify Membership
        call: bjs-wholesale-club-membership.verifymembership
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bjs-wholesale-club-membership-mcp
    port: 9090
    transport: http
    description: MCP adapter for BJ's Wholesale Club Partner API — Membership. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: verify-membership
      description: Verify Membership
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: bjs-wholesale-club-membership.verifymembership
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
