  - type: Features
    data:
      - name: Membership Management
        description: >-
          Supports membership-based access model for in-club and online purchasing,
          including membership verification and renewal.
      - name: Product Catalog
        description: >-
          Broad product assortment including fresh foods, groceries, household
          essentials, electronics, and general merchandise available via digital
          commerce integrations.
      - name: Digital Commerce
        description: >-
          Online ordering and delivery capabilities integrating with BJ's digital
          platform for partner fulfillment and affiliate programs.
      - name: Curbside Pickup
        description: >-
          Buy Online, Pick Up In Club capabilities available through BJ's digital
          platform for member convenience.
      - name: Inventory Availability
        description: >-
          Real-time inventory status across BJ's club locations, supporting
          in-club and curbside pickup fulfillment routing.
      - name: Club Locator
        description: >-
          Find BJ's club locations by ZIP code with hours, services, and amenities
          including gas stations, optical, and tire centers.
  - type: UseCases
    data:
      - name: Affiliate Marketing
        description: >-
          Partner programs enabling affiliate marketers to promote BJ's membership
          and products with commission-based compensation.
      - name: Product Data Integration
        description: >-
          Access product catalog and pricing data to enable comparison shopping
          and product listing integrations.
      - name: Membership Verification
        description: >-
          Verify BJ's membership status for partner benefits and co-branded
          programs.
      - name: Order Management
        description: >-
          Manage orders through BJ's digital commerce platform for dropship
          and fulfillment partnerships.
      - name: Inventory Routing
        description: >-
          Route orders to the nearest club with available inventory for
          curbside pickup or local delivery fulfillment.
  - type: Integrations
    data:
      - name: Commission Junction
        description: >-
          BJ's affiliate program is managed through CJ Affiliate (Commission Junction)
          for tracking and payments.
      - name: Google Shopping
        description: >-
          Product feeds integrated with Google Shopping for product discovery
          and advertising.
      - name: Instacart
        description: >-
          BJ's grocery delivery is available through the Instacart platform
          for same-day delivery to members.
