name: BJ's Wholesale Club
description: >-
  BJ's Wholesale Club is a leading operator of membership warehouse clubs concentrated
  primarily on the eastern half of the United States. BJ's offers its members significant
  savings on a wide assortment of merchandise, including fresh foods, groceries, household
  essentials, and general merchandise. The company operates over 230 clubs and is focused
  on digital transformation, offering APIs to partners for product data, inventory, pricing,
  and order management integrations.
